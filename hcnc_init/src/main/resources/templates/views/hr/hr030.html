<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<th:block layout:fragment="searchCondition"></th:block>

<th:block layout:fragment="content">
    <script>
        (function () {
            var script = document.currentScript;
            var contentsWrap = script && script.closest ? script.closest(".contents-wrap") : null;
            var whiteFull = script && script.closest ? script.closest(".white-full") : null;

            if (contentsWrap) {
                contentsWrap.classList.add("hr030-dashboard-wrap");
            }

            if (whiteFull) {
                whiteFull.classList.add("hr030-dashboard-shell");
            }
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>

    <div class="hr030-dashboard hr030-saas-dashboard" id="hr030-dashboard">
        <div class="hr030-admin-shell">
            <header class="hr030-admin-topbar" aria-label="인력관리 대시보드 상단">
                <div class="hr030-admin-topbar-row">
                    <div class="hr030-admin-brand">
                        <h4>Dashboard</h4>
                    </div>
                    <div class="hr030-admin-meta">
                        <span class="hr030-kpi-meta-note" id="todayDate"></span>
                    </div>
                </div>
            </header>

            <div class="hr030-kpi-grid" id="hr030KpiGrid" aria-label="핵심 인력 현황"></div>

            <div class="hr030-main-grid">
                <article class="hr030-panel hr030-panel--region">
                    <div class="hr030-region-combined">
                        <div class="hr030-region-combined-section hr030-region-combined-section--map">
                            <div id="hr030RegionHeader"></div>
                            <div class="hr030-region-map-card">
                                <div class="hr030-region-map-top">
                                    <strong>권역 선택</strong>
                                    <button type="button" class="hr030-region-reset" id="hr030RegionReset">전체 보기</button>
                                </div>
                                <div class="hr030-region-map" id="hr030RegionMap" aria-label="지역별 인력 지도"></div>
                                <div class="hr030-region-map-note" id="hr030RegionMapNote"></div>
                            </div>
                        </div>

                        <div class="hr030-region-combined-section hr030-region-combined-section--detail">
                            <div id="hr030DetailHeader"></div>
                            <div class="hr030-region-detail" id="hr030RegionDetail" aria-label="선택 지역 상세"></div>
                        </div>
                    </div>
                </article>

                <article class="hr030-panel hr030-panel--skills">
                    <div id="hr030SkillHeader"></div>
                    <div class="hr030-skill-layout">
                        <div class="hr030-skill-chart-wrap">
                            <div id="hr030SkillChart" class="hr030-skill-treemap" aria-label="주력 기술 분포 차트"></div>
                        </div>
                        <div class="hr030-skill-list hr030-skill-summary" id="hr030SkillList" aria-label="주력 기술 분포 요약"></div>
                    </div>
                </article>

                <article class="hr030-panel hr030-panel--availability">
                    <div id="hr030AvailabilityHeader"></div>
                    <div class="hr030-availability-combined">
                        <div class="hr030-availability-layout">
                            <div class="hr030-mini-chart-wrap hr030-mini-chart-wrap--availability">
                                <canvas id="hr030AvailabilityChart" aria-label="가용 인력 상태 비교 차트"></canvas>
                            </div>
                            <div class="hr030-status-stack" id="hr030AvailabilitySummary" aria-label="가용 인력 상태 요약"></div>
                        </div>
                        <div class="hr030-availability-list-board" aria-label="가용 인력 목록 패널">
                            <div class="hr030-availability-list-subhead" id="hr030AvailabilityListHeader"></div>
                            <div class="hr030-availability-employee-list hr030-availability-employee-list--panel" id="hr030AvailabilityList" aria-label="가용 인력 목록"></div>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </div>

    <script src="/js/api/hr/hr030.data.js"></script>
    <script src="/js/api/hr/hr030.js"></script>

</th:block>

</html>
