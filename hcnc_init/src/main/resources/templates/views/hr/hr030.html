<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<th:block layout:fragment="searchCondition"></th:block>

<th:block layout:fragment="content">
    <script>
        (function () {
            var script = document.currentScript;
            var contentsWrap = script && script.closest ? script.closest(".contents-wrap") : null;
            var whiteFull = script && script.closest ? script.closest(".white-full") : null;

            if (contentsWrap) {
                contentsWrap.classList.add("hr030-dashboard-wrap");
            }

            if (whiteFull) {
                whiteFull.classList.add("hr030-dashboard-shell");
            }
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>

    <style>
        /* 대시보드 예제 화면1의 css - HR030 practical SaaS dashboard */
        .contents-wrap.hr030-dashboard-wrap > section.white-full.hr030-dashboard-shell > .content-body {
          padding: 0 !important;
          overflow: hidden !important;
        }

        #hr030-dashboard.hr030-saas-dashboard {
          --hr030-app-bg: #f4f7fb;
          --hr030-surface: #ffffff;
          --hr030-surface-muted: #f7faff;
          --hr030-line: #dbe4f2;
          --hr030-line-soft: #e9eff7;
          --hr030-text-main: #1d2738;
          --hr030-text-sub: #5d6980;
          --hr030-text-soft: #8a96a9;
          --hr030-primary: #4f6ff7;
          --hr030-primary-strong: #3f5ed8;
          --hr030-primary-soft: #eef3ff;
          --hr030-success: #1fb6a6;
          --hr030-success-soft: #ecfbf8;
          --hr030-warning: #d89d3d;
          --hr030-warning-soft: #fff6e8;
          --hr030-danger: #eb8079;
          --hr030-danger-soft: #fff2f1;
          --hr030-slate: #7486a1;
          --hr030-slate-soft: #f2f6fb;
          --hr030-shadow: 0 6px 16px rgba(15, 23, 42, 0.05);
          --hr030-fs-kicker: 11px;
          --hr030-fs-caption: 12px;
          --hr030-fs-body: 13px;
          --hr030-fs-label: 13px;
          --hr030-fs-title-sm: 15px;
          --hr030-fs-title: 24px;
          --hr030-fs-kpi: 28px;
          height: 100%;
          min-height: 0;
          background: var(--hr030-app-bg);
          color: var(--hr030-text-main);
          font-family: "Pretendard Variable", "Pretendard", "Noto Sans KR", sans-serif;
        }

        #hr030-dashboard.hr030-saas-dashboard * {
          box-sizing: border-box;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-shell {
          height: 100%;
          min-height: 0;
          display: grid;
          grid-template-rows: auto auto minmax(0, 1fr);
          gap: 12px;
          padding: 16px 18px 18px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-topbar,
        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-card,
        #hr030-dashboard.hr030-saas-dashboard .hr030-panel {
          background: var(--hr030-surface);
          border: 1px solid #e9edf3;
          border-radius: 12px;
          box-shadow: var(--hr030-shadow);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-topbar {
          display: grid;
          gap: 8px;
          padding: 0;
          border: 0;
          border-radius: 0;
          background: transparent;
          box-shadow: none;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-topbar-row {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 16px;
          align-items: center;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-brand {
          display: grid;
          gap: 4px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-kicker {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          width: fit-content;
          min-height: auto;
          padding: 0;
          border: 0;
          border-radius: 0;
          background: transparent;
          color: var(--hr030-text-soft);
          font-size: var(--hr030-fs-kicker);
          font-weight: 700;
          letter-spacing: 0.04em;
          text-transform: uppercase;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-brand h4 {
          margin: 0;
          font-size: var(--hr030-fs-title);
          line-height: 1.18;
          font-weight: 700;
          letter-spacing: -0.03em;
          color: var(--hr030-text-main);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-brand p {
          margin: 2px 0 0;
          color: var(--hr030-text-sub);
          font-size: var(--hr030-fs-body);
          line-height: 1.46;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-actions {
          display: grid;
          gap: 10px;
          justify-items: end;
          min-width: 340px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-search {
          display: grid;
          width: 332px;
          grid-template-columns: 18px minmax(0, 1fr);
          align-items: center;
          gap: 10px;
          min-height: 40px;
          padding: 0 13px;
          border: 1px solid #d6e1f1;
          border-radius: 12px;
          background: #ffffff;
          transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-search svg {
          width: 18px;
          height: 18px;
          color: var(--hr030-text-soft);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-search input {
          width: 100%;
          height: 36px;
          border: 0;
          outline: 0;
          background: transparent;
          color: var(--hr030-text-main);
          font-size: var(--hr030-fs-body);
          line-height: 1.4;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-search input::placeholder {
          color: var(--hr030-text-soft);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-search:focus-within {
          border-color: #adc0ff;
          box-shadow: 0 0 0 3px rgba(79, 111, 247, 0.12);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-meta {
          display: flex;
          align-items: center;
          gap: 10px;
          flex-wrap: wrap;
          justify-content: flex-end;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-chip,
        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-user,
        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-alert {
          min-height: 34px;
          border: 1px solid var(--hr030-line-soft);
          border-radius: 10px;
          background: var(--hr030-surface);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-chip {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 0 12px;
          color: var(--hr030-text-sub);
          font-size: var(--hr030-fs-caption);
          font-weight: 600;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-chip svg,
        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-alert svg {
          width: 16px;
          height: 16px;
          color: var(--hr030-text-soft);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-alert {
          position: relative;
          width: 36px;
          padding: 0;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-alert-count {
          position: absolute;
          top: -4px;
          right: -4px;
          min-width: 18px;
          min-height: 18px;
          padding: 0 5px;
          border-radius: 999px;
          background: var(--hr030-primary);
          color: #ffffff;
          font-size: var(--hr030-fs-kicker);
          font-weight: 700;
          line-height: 18px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-user {
          display: inline-flex;
          align-items: center;
          gap: 10px;
          padding: 0 10px 0 8px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-user-avatar {
          width: 28px;
          height: 28px;
          border-radius: 50%;
          border: 1px solid #d7e3ff;
          background: var(--hr030-primary-soft);
          color: var(--hr030-primary-strong);
          display: inline-flex;
          align-items: center;
          justify-content: center;
          font-size: 12px;
          font-weight: 800;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-user-copy {
          display: grid;
          gap: 2px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-user-copy strong {
          font-size: var(--hr030-fs-body);
          color: var(--hr030-text-main);
          font-weight: 700;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-user-copy span {
          color: var(--hr030-text-soft);
          font-size: var(--hr030-fs-caption);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-toolbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 12px;
          flex-wrap: wrap;
          padding-top: 2px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-filter {
          display: flex;
          align-items: center;
          gap: 12px;
          flex-wrap: wrap;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-filter-label {
          color: var(--hr030-text-sub);
          font-size: var(--hr030-fs-caption);
          font-weight: 700;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-filter-group {
          display: flex;
          gap: 8px;
          flex-wrap: wrap;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-filter-group button {
          min-height: 30px;
          padding: 0 12px;
          border: 1px solid var(--hr030-line);
          border-radius: 999px;
          background: #ffffff;
          color: var(--hr030-text-soft);
          font-size: var(--hr030-fs-caption);
          font-weight: 700;
          cursor: pointer;
          transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-filter-group button:hover {
          border-color: #d2dcf0;
          background: #f8fbff;
          color: var(--hr030-text-sub);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-filter-group button.is-active {
          border-color: #cad7ff;
          background: var(--hr030-primary-soft);
          color: var(--hr030-primary-strong);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-admin-search-note {
          min-height: 18px;
          margin: 0;
          color: var(--hr030-text-soft);
          font-size: var(--hr030-fs-caption);
          line-height: 1.45;
          text-align: right;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-grid {
          display: grid;
          grid-template-columns: repeat(6, minmax(0, 1fr));
          gap: 12px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-card {
          display: grid;
          gap: 8px;
          min-height: 90px;
          padding: 16px 16px 14px;
          box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-top {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-label {
          font-size: var(--hr030-fs-label);
          font-weight: 600;
          color: var(--hr030-text-soft);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-delta {
          min-height: 22px;
          padding: 0 7px;
          border-radius: 999px;
          border: 1px solid transparent;
          font-size: var(--hr030-fs-kicker);
          font-weight: 800;
          line-height: 22px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-delta.is-up {
          background: var(--hr030-success-soft);
          border-color: #d6f1eb;
          color: var(--hr030-success);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-delta.is-down {
          background: var(--hr030-slate-soft);
          border-color: #dde6f1;
          color: var(--hr030-slate);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-delta.is-warn {
          background: var(--hr030-warning-soft);
          border-color: #f0dfb9;
          color: var(--hr030-warning);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-delta.is-neutral {
          background: var(--hr030-primary-soft);
          border-color: #d8e3ff;
          color: var(--hr030-primary-strong);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-value {
          font-size: 26px;
          line-height: 1;
          font-weight: 700;
          letter-spacing: -0.04em;
          color: var(--hr030-text-main);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-kpi-description {
          margin: 0;
          color: var(--hr030-text-soft);
          font-size: var(--hr030-fs-caption);
          line-height: 1.35;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-main-grid {
          min-height: 0;
          display: grid;
          grid-template-columns: minmax(0, 0.98fr) minmax(0, 0.86fr) minmax(226px, 0.64fr) minmax(226px, 0.64fr);
          grid-template-rows: minmax(252px, 1fr) minmax(176px, 0.76fr) minmax(176px, 0.76fr);
          gap: 12px;
          align-items: stretch;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel {
          position: relative;
          min-height: 0;
          display: grid;
          grid-template-rows: auto minmax(0, 1fr);
          overflow: hidden;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel::before {
          content: "";
          position: absolute;
          top: 0;
          left: 18px;
          right: 18px;
          height: 2px;
          border-radius: 999px;
          background: linear-gradient(90deg, #4f6ff7 0%, #7e97ff 56%, #1fb6a6 100%);
          opacity: 0.64;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--wide {
          grid-column: 1 / 3;
          grid-row: 2 / 4;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--attendance {
          grid-column: 3 / 5;
          grid-row: 1;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--approval {
          grid-column: 3;
          grid-row: 2 / 4;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--schedule {
          grid-column: 4;
          grid-row: 2 / 4;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--attendance .hr030-section-head {
          padding: 13px 0 6px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--attendance .hr030-section-copy {
          gap: 2px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--approval .hr030-section-head,
        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--schedule .hr030-section-head {
          padding: 12px 0 7px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--approval .hr030-section-copy,
        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--schedule .hr030-section-copy {
          gap: 2px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--approval .hr030-section-copy h5,
        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--schedule .hr030-section-copy h5 {
          font-size: 14px;
          line-height: 1.25;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--approval .hr030-section-copy p,
        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--schedule .hr030-section-copy p {
          display: -webkit-box;
          -webkit-box-orient: vertical;
          -webkit-line-clamp: 1;
          overflow: hidden;
          font-size: var(--hr030-fs-kicker);
          line-height: 1.25;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--approval .hr030-section-meta,
        #hr030-dashboard.hr030-saas-dashboard .hr030-panel--schedule .hr030-section-meta {
          font-size: var(--hr030-fs-kicker);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-section-head {
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          gap: 12px;
          margin: 0 18px;
          padding: 16px 0 8px;
          border-bottom: 1px solid #edf1f5;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-section-copy {
          display: grid;
          gap: 4px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-section-copy h5 {
          margin: 0;
          font-size: var(--hr030-fs-title-sm);
          font-weight: 600;
          line-height: 1.35;
          color: var(--hr030-text-main);
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-section-copy p {
          margin: 0;
          color: var(--hr030-text-soft);
          font-size: var(--hr030-fs-caption);
          line-height: 1.4;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-section-meta {
          display: inline-flex;
          align-items: center;
          min-height: auto;
          padding: 0;
          border: 0;
          border-radius: 0;
          background: transparent;
          color: var(--hr030-text-soft);
          font-size: var(--hr030-fs-caption);
          font-weight: 600;
          white-space: nowrap;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel-chart-wrap {
          min-height: 0;
          min-height: 144px;
          height: 100%;
          padding: 12px 16px 16px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-panel-chart-wrap canvas,
        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-chart canvas {
          width: 100% !important;
          height: 100% !important;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-wrap {
          min-height: 0;
          display: grid;
          grid-template-columns: 176px minmax(0, 1fr);
          gap: 14px;
          padding: 8px 14px 14px;
          align-items: start;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-chart {
          min-height: 0;
          width: min(176px, 100%);
          min-height: 176px;
          aspect-ratio: 1 / 1;
          height: auto;
          justify-self: center;
          align-self: start;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-legend {
          display: grid;
          gap: 0;
          border: 1px solid var(--hr030-line-soft);
          border-radius: 12px;
          overflow: hidden;
          min-width: 0;
          align-self: start;
          height: auto;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-legend-item {
          display: flex;
          align-items: center;
          gap: 8px;
          min-height: 33px;
          padding: 7px 10px;
          border-bottom: 1px solid var(--hr030-line-soft);
          background: #ffffff;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-legend-item:last-child {
          border-bottom: 0;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-dot {
          width: 9px;
          height: 9px;
          border-radius: 50%;
          flex: 0 0 auto;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-copy {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
          width: 100%;
          min-width: 0;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-copy strong {
          color: var(--hr030-text-main);
          font-size: var(--hr030-fs-caption);
          font-weight: 600;
          line-height: 1.2;
          white-space: nowrap;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-attendance-copy span {
          color: var(--hr030-text-soft);
          font-size: var(--hr030-fs-kicker);
          line-height: 1.2;
          white-space: nowrap;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-table-wrap,
        #hr030-dashboard.hr030-saas-dashboard .hr030-list-wrap {
          min-height: 0;
          padding: 12px 16px 16px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-table-wrap {
          display: grid;
          grid-template-rows: auto minmax(0, 1fr);
          gap: 6px;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-table-meta {
          color: var(--hr030-text-soft);
          font-size: var(--hr030-fs-kicker);
          line-height: 1.35;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-table-shell {
          min-height: 0;
          height: 100%;
          overflow: hidden;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-list-wrap {
          display: grid;
          align-content: start;
          gap: 0;
          border: 1px solid var(--hr030-line-soft);
          border-radius: 12px;
          overflow: hidden;
          background: #ffffff;
          min-height: 0;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-list-item {
          display: grid;
          gap: 6px;
          padding: 8px 10px;
          border: 0;
          border-bottom: 1px solid var(--hr030-line-soft);
          border-radius: 0;
          background: #ffffff;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-list-item:last-child {
          border-bottom: 0;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-list-item:hover {
          background: #f7faff;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-approval-item {
          grid-template-columns: minmax(0, 1fr) auto;
          align-items: center;
        }

        #hr030-dashboard.hr030-saas-dashboard .hr030-list-main {
          display: grid;
          gap: 4px;
          min-width: 0;
        }
