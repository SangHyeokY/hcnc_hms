<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<!-- 추가 버튼 정의 -->
<th:block layout:fragment="additionalButtons">
    <button type="button" class="btn-excel">엑셀 다운로드</button>
</th:block>

<!-- 실제 컨텐츠 영역 -->
<th:block layout:fragment="content">
    <script>
        (function () {
            var script = document.currentScript;
            var contentsWrap = script && script.closest ? script.closest(".contents-wrap") : null;
            var whiteFull = script && script.closest ? script.closest(".white-full") : null;

            if (contentsWrap) {
                contentsWrap.classList.add("hr010-dashboard-wrap");
            }

            if (whiteFull) {
                whiteFull.classList.add("hr010-dashboard-shell");
            }
        })();
    </script>

    <!-- ================= 검색 영역 ================= -->
    <section class="search-area mg-b20">
        <form action="">
            <div class="fl-sb">
                <div class="search-info">
                    <div class="search-input hr010-search-tag-wrap">
                        <p class="fl-ac">
                            <label for="searchKeyword" class="fw600 pd-r10">• Tag 검색</label>
                            <input type="text" class="hr010-search-input hr010-search-keyword-input" id="searchKeyword" name="searchKeyword" placeholder="Tag 검색" />
                        </p>
                    </div>
                </div>
                <div class="search-btn-area">
                    <button class="btn-search">조회</button>
                </div>
            </div>
        </form>
    </section>

    <!-- ================= 메인 리스트 ================= -->
    <section class="white-full">
        <div class="content-title fl-sb fl-ac">
            <h4 class="page-sub-title">인적사항 목록</h4>
        </div>
        <div class="hr010-user-type-tabs mg-b15" role="tablist" aria-label="인력 구분">
            <div class="toggle-filter-block">
                <span class="toggle-filter-label toggle-text-reveal" style="--toggle-text-delay: 52ms;">구분</span>
                <div class="toggle-group" id="togglePerspectiveGroup">
                    <button type="button" class="toggle-filter-chip is-active" data-user-type="all">전체</button>
                    <button type="button" class="toggle-filter-chip" data-user-type="staff">직원</button>
                    <button type="button" class="toggle-filter-chip" data-user-type="freelancer">프리랜서</button>
                </div>
            </div>
        </div>
        <div id="CARD_HR010_A"></div>
        <input type="hidden" id="dev_id" name="dev_id" th:value="${dev_id}">
    </section>

    <script src="/js/api/hr/hr010.js"></script>

</th:block>

</html>
