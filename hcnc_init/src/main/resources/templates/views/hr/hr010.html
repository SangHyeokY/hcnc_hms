<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<!-- 추가 버튼 정의 -->
<th:block layout:fragment="additionalButtons">
    <button type="button" class="btn-excel">엑셀 다운로드</button>
</th:block>

<!-- 실제 컨텐츠 영역 -->
<th:block layout:fragment="content">
    <script>
        (function () {
            var script = document.currentScript;
            var contentsWrap = script && script.closest ? script.closest(".contents-wrap") : null;
            var whiteFull = script && script.closest ? script.closest(".white-full") : null;

            if (contentsWrap) {
                contentsWrap.classList.add("hr010-dashboard-wrap");
            }

            if (whiteFull) {
                whiteFull.classList.add("hr010-dashboard-shell");
            }
        })();
    </script>

    <section class="hr010-smart-filter" id="hr010SmartFilter">
        <div class="content-title fl-sb fl-ac hr010-smart-filter__head">
            <h4 class="page-sub-title">스마트 필터</h4>
            <div class="hr010-smart-filter__head-actions">
                <button type="button" class="hr010-filter-toggle-btn hr010-filter-toggle-btn--refresh" id="hr010FilterRefreshBtn" aria-label="스마트 필터 초기화"></button>
            </div>
        </div>
        <div class="hr010-user-type-tabs mg-b15" role="tablist" aria-label="인력 구분">
            <div class="toggle-group" id="togglePerspectiveGroup">
                <button type="button" class="toggle-filter-chip is-active" data-user-type="all">전체</button>
                <button type="button" class="toggle-filter-chip" data-user-type="staff">직원</button>
                <button type="button" class="toggle-filter-chip" data-user-type="freelancer">프리랜서</button>
            </div>
        </div>
        <div class="hr010-filter-dropdowns">

                    <div class="dropdown dropdown-skl-grp open">
                        <button class="dropdown-btn">
                            <span class="dropdown-btn__label">주개발언어</span>
                            <span class="dropdown-btn__arrow" aria-hidden="true"></span>
                        </button>
                        <select id="select_skl_grp" style="display:none"></select>
                        <ul class="dropdown-menu">

                        </ul>
                    </div>

                    <div class="dropdown dropdown-ctrt-typ">
                        <button class="dropdown-btn">
                            <span class="dropdown-btn__label">계약형태</span>
                            <span class="dropdown-btn__arrow" aria-hidden="true"></span>
                        </button>
                        <select id="select_ctrt_typ" style="display:none;"></select>
                        <ul class="dropdown-menu">

                        </ul>
                    </div>

                    <div class="dropdown dropdown-work-md">
                        <button class="dropdown-btn">
                            <span class="dropdown-btn__label">근무가능형태</span>
                            <span class="dropdown-btn__arrow" aria-hidden="true"></span>
                        </button>
                        <select id="select_work_md" style="display:none;"></select>
                        <ul class="dropdown-menu">

                        </ul>
                    </div>

                    <div class="dropdown dropdown-grade">
                        <button class="dropdown-btn">
                            <span class="dropdown-btn__label">등급</span>
                            <span class="dropdown-btn__arrow" aria-hidden="true"></span>
                        </button>
                        <ul class="dropdown-menu"></ul>
                    </div>

                    <div class="dropdown dropdown-sido-cd">
                        <button class="dropdown-btn">
                            <span class="dropdown-btn__label">거주지역</span>
                            <span class="dropdown-btn__arrow" aria-hidden="true"></span>
                        </button>
                        <select id="select_sido-cd" style="display:none;"></select>
                        <ul class="dropdown-menu">

                        </ul>
                    </div>

        </div>
    </section>

    <section class="hr010-main">
        <div class="content-title fl-sb fl-ac hr010-main-titlebar">
            <h4 class="page-sub-title">인적사항 목록</h4>
            <div class="hr010-main-actions">
                <button type="button" class="btn hr010-create-btn" id="hr010CreateBtn">등록하기</button>
            </div>
        </div>
        <div class="hr010-search-area">
            <div class="hr010-search-tag-wrap">
                <div class="hr010-search-control-row">
                    <div class="hr010-search-field-wrap">
                        <div class="hr010-tag-search-box">
                            <div id="hr010TagArea" class="hr010-tag-area" aria-live="polite"></div>
                            <input type="text" class="hr010-search-input hr010-search-keyword-input" id="hr010TagKeywordInput" name="searchKeyword" placeholder="이름 또는 필터값을 입력하면 추천어가 표시됩니다." />
                            <div class="hr010-search-action-group">
                                <button type="button" class="hr010-search-icon-btn hr010-search-icon-btn--search" id="hr010SearchTrigger" aria-label="검색"></button>
                                <span class="hr010-search-action-divider" aria-hidden="true"></span>
                                <button type="button" class="hr010-search-icon-btn hr010-search-icon-btn--reset btn-search" aria-label="초기화"></button>
                            </div>
                        </div>
                        <div id="hr010TagSuggestionBox" class="hr010-tag-suggestion-box" hidden></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="hr010-result-bar">
            <p class="hr010-result-count">검색결과 <strong id="hr010ResultCount">0</strong>건</p>
            <div class="hr010-view-toggle" role="tablist" aria-label="보기 형식">
                <button type="button" class="hr010-view-toggle-btn is-active" data-view="list" role="tab" aria-selected="false">
                    <span class="hr010-view-toggle-btn__icon" aria-hidden="true"></span>
                    <span>LIST</span>
                </button>
                <button type="button" class="hr010-view-toggle-btn" data-view="card" role="tab" aria-selected="true">
                    <span class="hr010-view-toggle-btn__icon" aria-hidden="true"></span>
                    <span>CARD</span>
                </button>
            </div>
        </div>

        <div class="hr010-content-panel">
            <div id="CARD_HR010_A"></div>
            <div class="hidden data">
                <input type="hidden" id="dev_id" name="dev_id" th:value="${dev_id}">
                <input type="hidden" id="dev_nm" name="dev_nm" th:value="${dev_nm}">
                <input type="hidden" id="main_lang" name="main_lang" th:value="${main_lang}">
            </div>
        </div>
    </section>

    <script src="/js/api/hr/hr010.js"></script>

</th:block>

</html>
