<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<th:block layout:fragment="searchCondition">
    <div class="search-select">
        <label class="fw600 search-combo-label">검색조건</label>
        <select name="searchType" id="searchType">
            <option value="">전체</option>
            <option value="user_id">ID</option>
            <option value="user_nm">이름</option>
            <option value="email">이메일</option>
            <option value="tel">연락처</option>
            <option value="role_cd">권한</option>
            <option value="job_cd">직무</option>
            <option value="dept_cd">부서</option>
        </select>
    </div>
    <div class="search-input">
        <p class="fl-ac">
            <label for="searchKeyword" class="fw600">검색어</label>
            <input type="text" class="" id="searchKeyword" name="searchKeyword" placeholder="검색할 ID / 이름 / 이메일 / 연락처 / 권한 / 직무 / 부서를 입력하세요." />
        </p>
    </div>
    <div class="search-select search-useyn-radio">
        <label class="search-useyn-label fw600">사용여부</label>
        <div class="radio-box search-useyn-options">
            <label for="searchUseYnAll">
                <input type="radio" id="searchUseYnAll" name="searchUseYnRadio" value="" checked>
                전체
            </label>
            <label for="searchUseYnY">
                <input type="radio" id="searchUseYnY" name="searchUseYnRadio" value="Y">
                사용 (Y)
            </label>
            <label for="searchUseYnN">
                <input type="radio" id="searchUseYnN" name="searchUseYnRadio" value="N">
                미사용 (N)
            </label>
        </div>
    </div>
</th:block>

<th:block layout:fragment="content">
    <div class="content-title fl-sb fl-ac">
        <h4 class="page-sub-title">사용자 정보</h4>
        <div class="btn-area">
            <button type="button" class="btn btn-main-add"><img src="./images/common/btn-ico-plus.png">등록</button>
            <button type="button" class="btn btn-main-edit"><img src="./images/common/btn-ico-pencil.png">수정</button>
            <button type="button" class="btn btn-main-del"><img src="./images/common/btn-ico-trash.png">삭제</button>
        </div>
    </div>
    <div class="content grid-pager-fixed">
        <div class="table-wrap grid-pager-fixed-wrap">
            <div id="TABLE_USER" class="full-table"></div>
        </div>
    </div>

    <!-- 사용자 상세 모달 -->
    <div class="modal-wrap content" id="view-user-area" style="display: none">
        <div class="modal-container">

            <div class="header">
                <h3 class="sub-title">사용자 정보 <span>상세</span></h3>
                <div class="btn-area">
                    <button class="close-btn" onclick="closeUserViewModal()">
                        <img src="./icons/Icon-close.png" alt="" />
                    </button>
                </div>
            </div>

            <div class="modal-content">
                <article>

                    <!-- 기본 정보 -->
                    <div class="section">
                        <div class="section-title">기본 정보</div>
                        <div class="form-grid">

                            <div class="form-group">
                                <label>ID</label>
                                <p class="text" id="view_user_id"></p>
                            </div>

                            <div class="form-group">
                                <label>이름</label>
                                <p class="text" id="view_user_nm"></p>
                            </div>

                            <div class="form-group">
                                <label>e-mail</label>
                                <p class="text" id="view_email"></p>
                            </div>

                            <div class="form-group">
                                <label>연락처</label>
                                <p class="text" id="view_tel"></p>
                            </div>

                        </div>
                    </div>

                    <!-- 조직 정보 -->
                    <div class="section">
                        <div class="section-title">조직 정보</div>
                        <div class="form-grid">

                            <div class="form-group">
                                <label>권한</label>
                                <p class="text" id="view_role_cd"></p>
                            </div>

                            <div class="form-group">
                                <label>직무</label>
                                <p class="text" id="view_job_cd"></p>
                            </div>

                            <div class="form-group">
                                <label>부서</label>
                                <p class="text" id="view_dept_cd"></p>
                            </div>

                        </div>
                    </div>

                    <!-- 상태 -->
                    <div class="section">
                        <div class="section-title">상태</div>
                        <div class="form-grid">

                            <div class="form-group">
                                <label>사용 여부</label>
                                <p class="text" id="view_use_yn"></p>
                            </div>

                            <div class="form-group">
                                <label>계정 상태</label>
                                <p class="text" id="view_lock_yn"></p>
                            </div>

                        </div>
                    </div>

                    <!-- 비고 -->
                    <div class="section full-modal-row">
                        <div class="section-title">비고</div>
                        <div class="form-group">
                            <p class="text" id="view_remark"></p>
                        </div>
                    </div>

                </article>
            </div>

            <div class="modal-btn">
                <ul>
                    <li>
                        <button class="btn btn-close" onclick="closeUserViewModal()">
                            닫기
                        </button>
                    </li>
                </ul>
            </div>

        </div>
    </div>

    <!-- 사용자 등록 모달 -->
    <div class="modal-wrap content" id="write-user-area" style="display: none">
        <div class="modal-container">

            <div class="header">
                <h3 class="sub-title">사용자 정보 <span class="edit-mode">등록</span></h3>
                <div class="btn-area">
                    <button class="close-btn" onclick="closeUserWriteModal()">
                        <img src="./icons/Icon-close.png" alt="" />
                    </button>
                </div>
            </div>

            <div class="modal-content">
                <article>

                    <!-- 기본 정보 -->
                    <div class="section">
                        <div class="section-title">기본 정보</div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="write_user_id">아이디</label>
                                <input type="text" id="write_user_id" placeholder="아이디">
                            </div>

                            <div class="form-group">
                                <label for="write_user_nm">이름</label>
                                <input type="text" id="write_user_nm" placeholder="이름">
                            </div>

                            <div class="form-group">
                                <label for="write_pwd_hash">비밀번호</label>
                                <input type="password" id="write_pwd_hash" placeholder="비밀번호">
                            </div>

                            <div class="form-group">
                                <label for="write_email">이메일</label>
                                <input type="text" id="write_email" placeholder="이메일">
                            </div>

                            <div class="form-group">
                                <label for="write_tel">연락처</label>
                                <input type="text" id="write_tel" placeholder="연락처">
                            </div>
                        </div>
                    </div>

                    <!-- 조직 정보 -->
                    <div class="section">
                        <div class="section-title">조직 정보</div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="write_role_cd">권한</label>
                                <select id="write_role_cd">
                                    <option value="">선택</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="write_job_cd">직무</label>
                                <select id="write_job_cd">
                                    <option value="">선택</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="write_dept_cd">부서</label>
                                <select id="write_dept_cd">
                                    <option value="">선택</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 상태 정보 -->
                    <div class="section">
                        <div class="section-title">상태</div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="write_use_yn">사용 여부</label>
                                <select id="write_use_yn">
                                    <option value="Y">사용</option>
                                    <option value="N">미사용</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="write_lock_yn">계정 상태</label>
                                <select id="write_lock_yn">
                                    <option value="N">활성</option>
                                    <option value="Y">비활성</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 비고 -->
                    <div class="section full-modal-row">
                        <div class="section-title">비고</div>
                        <div class="form-group">
                            <label for="write_remark"></label>
                            <textarea id="write_remark"></textarea>
                        </div>
                    </div>

                </article>
            </div>
            <div class="modal-btn">
                <ul>
                    <li>
                        <button class="btn btn-close" onclick="closeUserWriteModal()">
                            닫기
                        </button>
                    </li>
                    <li><button class="btn btn-save" id="btn-user-save">저장</button></li>
                </ul>
            </div>
        </div>
    </div>

    <script src="/js/api/cm/cm010.js"></script>

</th:block>

</html>
