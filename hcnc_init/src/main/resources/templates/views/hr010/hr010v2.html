<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<th:block layout:fragment="content">
    <script>
        (function () {
            var script = document.currentScript;
            var contentsWrap = script && script.closest ? script.closest(".contents-wrap") : null;
            var whiteFull = script && script.closest ? script.closest(".white-full") : null;

            if (contentsWrap) {
                contentsWrap.classList.add("hr010-dashboard-wrap", "hr010v2-wrap");
            }

            if (whiteFull) {
                whiteFull.classList.add("hr010-dashboard-shell", "hr010v2-shell");
            }
        })();
    </script>

    <div class="hr010v2-page" id="hr010v2Page">
        <input type="hidden" id="dev_id" name="dev_id" th:value="${dev_id}">
        <input type="hidden" id="dev_nm" name="dev_nm" th:value="${dev_nm}">
        <input type="hidden" id="main_lang" name="main_lang" th:value="${main_lang}">

            <div class="hr010v2-dashboard">
            <div class="hr010v2-topbar">
                <h1 class="hr010v2-topbar__title">
                    <span class="hr010v2-topbar__title-icon" aria-hidden="true">
                    </span>
                    <span class="hr010v2-topbar__title-text">인력 운영 대시보드</span>
                </h1>
                <div class="hr010v2-topbar__tools">
                    <div class="hr010v2-topbar__meta" aria-label="기준 일자">
                        <span class="hr010v2-topbar__today">Today</span>
                        <span class="hr010v2-topbar__date" id="hr010v2TodayLabel">4월 20일 (월)</span>
                    </div>
                    <div class="hr010v2-filterbar" aria-label="대시보드 필터">
                        <label class="hr010v2-filter">
                            <span class="hr010v2-filter__label">주요 분야</span>
                            <select id="hr010v2DepartmentFilter" class="hr010v2-filter__control js-hr010v2-filter" data-filter="department">
                                <option value="">전체</option>
                            </select>
                        </label>
                        <label class="hr010v2-filter">
                            <span class="hr010v2-filter__label">기술 스택</span>
                            <select id="hr010v2StackFilter" class="hr010v2-filter__control js-hr010v2-filter" data-filter="stack">
                                <option value="">전체</option>
                            </select>
                        </label>
                        <label class="hr010v2-filter">
                            <span class="hr010v2-filter__label">투입 가능 시기</span>
                            <select id="hr010v2TimingFilter" class="hr010v2-filter__control js-hr010v2-filter" data-filter="timing">
                                <option value="">전체</option>
                                <option value="now">즉시 가능</option>
                                <option value="soon">2주 내 가능</option>
                                <option value="coord">가용일 미확정</option>
                                <option value="later">2주 이후<br>~<br> 4주 이내</option>
                            </select>
                        </label>
                    </div>
                </div>
            </div>

            <div class="hr010v2-kpi-grid" id="hr010v2KpiGrid"></div>

            <div class="hr010v2-main-grid">
                <article class="hr010v2-panel hr010v2-panel--health">
                    <div class="hr010v2-panel__head">
                        <div>
                            <h3>투입 가능 분포</h3>
                        </div>
                    </div>

                    <div class="hr010v2-health-layout">
                        <div class="hr010v2-health-summary">
                            <div class="hr010v2-health-composition">
                                <div class="hr010v2-health-composition__content" id="hr010v2HealthComposition" role="img" aria-label="투입 가능 구성비"></div>
                            </div>
                        </div>

                        <div class="hr010v2-health-stats" id="hr010v2HealthStats"></div>
                    </div>
                </article>

                <article class="hr010v2-panel hr010v2-panel--supply">
                    <div class="hr010v2-panel__head">
                        <div>
                            <h3>주력 기술 분포</h3>
                        </div>
                    </div>

                    <div class="hr010v2-supply-table">
                        <div class="hr010v2-supply-columns__head">
                            <span class="hr010v2-supply-columns__label hr010v2-supply-columns__label--top">
                                보유기술 많은 순 <strong>TOP3</strong> <span class="hr010v2-supply-columns__arrow hr010v2-supply-columns__arrow--up" aria-hidden="true">↑</span>
                            </span>
                            <span class="hr010v2-supply-columns__label hr010v2-supply-columns__label--bottom">
                                보유기술 적은 순 <strong>TOP3</strong> <span class="hr010v2-supply-columns__arrow hr010v2-supply-columns__arrow--down" aria-hidden="true">↓</span>
                            </span>
                        </div>
                        <div class="hr010v2-supply-columns" id="hr010v2SkillRows"></div>
                    </div>
                </article>

                <article class="hr010v2-panel hr010v2-panel--pool">
                    <div class="hr010v2-panel__head">
                        <div>
                            <h3>인력 등급 구성</h3>
                        </div>
                        <div class="hr010v2-panel__actions">
                            <button type="button" class="hr010v2-panel-btn" id="hr010CreateBtn">
                                <img src="/icons/btn-ico-plus.png" alt="" aria-hidden="true">
                                <span>인력 등록</span>
                            </button>
                        </div>
                    </div>

                    <div class="hr010v2-recommend-list" id="hr010v2RecommendList"></div>
                </article>

                <article class="hr010v2-panel hr010v2-panel--timeline">
                    <div class="hr010v2-panel__head">
                        <div>
                            <h3 class="hr010v2-panel__title-with-help">
                                계약 만료 임박 현황
                                <span class="hr010v2-panel-help-wrap">
                                    <button type="button" class="hr010v2-panel-help" aria-describedby="hr010v2ContractHelpTooltip" aria-label="재계약 대상 설명">?</button>
                                    <span class="hr010v2-panel-help-tooltip" id="hr010v2ContractHelpTooltip" role="tooltip">
                                        계약 종료일 기준으로 재계약 검토가 필요한 인력의 분포입니다.
                                    </span>
                                </span>
                            </h3>
                        </div>
                    </div>

                    <div class="hr010v2-weekly-bars" id="hr010v2WeeklyBars"></div>
                </article>

                <article class="hr010v2-panel hr010v2-panel--grade">
                    <div class="hr010v2-panel__head">
                        <div>
                            <h3>전체 등급 비중</h3>
                        </div>
                        <div class="hr010v2-panel__actions">
                            <div class="hr010v2-grade-switch" role="tablist" aria-label="등급 비중 보기 전환">
                                <button type="button" class="hr010v2-grade-switch__btn js-hr010v2-grade-view is-active" data-view="grade" aria-pressed="true">등급</button>
                                <button type="button" class="hr010v2-grade-switch__btn js-hr010v2-grade-view" data-view="kosa" aria-pressed="false">KOSA</button>
                            </div>
                        </div>
                    </div>

                    <div class="hr010v2-grade-chart" id="hr010v2GradeBars"></div>
                </article>

                <article class="hr010v2-panel hr010v2-panel--alerts">
                    <div class="hr010v2-panel__head">
                        <div>
                            <h3>주요 알림</h3>
                        </div>
                    </div>

                    <div class="hr010v2-alert-list" id="hr010v2AlertList"></div>
                </article>
            </div>
        </div>
    </div>

    <script src="/js/api/hr/hr010.js"></script>
</th:block>

</html>
