<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<th:block layout:fragment="searchCondition">
    <div class="search-input">
        <p class="fl-ac">
            <label for="searchKeyword" class="fw600">검색어</label>
            <input type="text" class="" id="searchKeyword" name="searchKeyword" placeholder="검색할 코드 / 코드 그룹명을 입력하세요." />
        </p>
    </div>
    <div class="search-select search-useyn-radio">
        <label class="search-useyn-label fw600">사용여부</label>
        <div class="radio-box search-useyn-options">
            <label for="searchUseYnAll">
                <input type="radio" id="searchUseYnAll" name="searchUseYnRadio" value="" checked>
                전체
            </label>
            <label for="searchUseYnY">
                <input type="radio" id="searchUseYnY" name="searchUseYnRadio" value="Y">
                사용 (Y)
            </label>
            <label for="searchUseYnN">
                <input type="radio" id="searchUseYnN" name="searchUseYnRadio" value="N">
                미사용 (N)
            </label>
        </div>
    </div>
</th:block>

<th:block layout:fragment="content">
    <script>
        <!--  테이블이 2개 이상 들어가는 경우 whitefull이 두개 이상들어가면 사용필요-->
        $(document).ready(function() {
            $(document).ready(function() {
                $('.contents-wrap > .white-full').addClass('no-white');
            });
        });
    </script>
    <div class="content common-code-page">
        <div class="form-wrap">
            <div class="common-code-wrap">
                <section class="white-full common-code-section">
                    <div class="content-title fl-sb fl-ac">
                        <h4 class="page-sub-title">코드 그룹</h4>
                        <div class="btn-area">
                            <button type="button" class="btn btn-main-add"><img src="./images/common/btn-ico-plus.png">등록</button>
                            <button type="button" class="btn btn-main-edit"><img src="./images/common/btn-ico-pencil.png">수정</button>
<!--                            <button type="button" class="btn btn-main-del"><img src="./images/common/btn-ico-trash.png">삭제</button>-->
                        </div>
                    </div>
                    <div class="content-body">
                        <div id="TABLE_COMMON_MAIN" class="full-table"></div>
                    </div>
                </section>

                <section class="white-full common-code-section">
                    <div class="content-title fl-sb fl-ac">
                        <h4 class="page-sub-title">상세 코드</h4>
<!--                        <span class="detail-sort-hint">드래그 &amp; 드롭으로 정렬 순서 변경 가능</span>-->
                        <div class="btn-area">
                            <button type="button" class="btn btn-detail-add"><img src="./images/common/btn-ico-plus.png">등록</button>
                            <button type="button" class="btn btn-detail-edit"><img src="./images/common/btn-ico-pencil.png">수정</button>
<!--                            <button type="button" class="btn btn-detail-del"><img src="./images/common/btn-ico-trash.png">삭제</button>-->
                            <button type="button" class="btn btn-detail-sort-save">정렬 저장</button>
                        </div>
                    </div>
                    <div class="content-body">
                        <div id="TABLE_COMMON_DETAIL" class="full-table"></div>
                    </div>
                </section>
            </div>

            <!-- 코드그룹 모달 -->
            <div class="modal-wrap content" id="write-main-area" style="display: none">
                <div class="modal-container">

                    <div class="header">
                        <h3 class="sub-title">코드 그룹 <span id="main-type">등록</span></h3>
                        <div class="btn-area">
                            <button class="close-btn" onclick="closeMainWriteModal()">
                                <img src="./icons/Icon-close.png" alt="" />
                            </button>
                        </div>
                    </div>

                    <div class="modal-content">
                        <article>

                            <!-- 기본 정보 -->
                            <div class="section">
                                <!-- <div class="section-title">기본 정보</div> -->
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label for="write_main_grp_cd">코드 그룹</label>
                                        <select id="write_main_grp_cd"></select>
                                        <input type="hidden" id="write_main_parent_grp_cd">
                                    </div>

                                    <div class="form-group">
                                        <label for="write_main_cd">코드</label>
                                        <input type="text" class="text" id="write_main_cd" placeholder="코드">
                                    </div>

                                    <div class="form-group">
                                        <label for="write_main_grp_nm">코드 그룹명</label>
                                        <input type="text" class="text" id="write_main_grp_nm" placeholder="코드 그룹명">
                                    </div>

                                    <div class="form-group">
                                        <label for="write_main_use_yn">사용여부</label>
                                        <select id="write_main_use_yn">
                                            <option value="Y">사용 (Y)</option>
                                            <option value="N">미사용 (N)</option>
                                        </select>
                                    </div>

                                </div>
                            </div>

                        </article>
                    </div>
                    <div class="modal-btn">
                        <ul>
                            <li>
                                <button class="btn btn-close" onclick="closeMainWriteModal()">
                                    닫기
                                </button>
                            </li>
                            <li><button class="btn btn-save" id="btn-main-save">저장</button></li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 상세코드 모달 -->
            <div class="modal-wrap content" id="write-detail-area" style="display: none">
                <div class="modal-container">

                    <div class="header">
                        <h3 class="sub-title">상세 코드 <span id="detail-type">등록</span></h3>
                        <div class="btn-area">
                            <button class="close-btn" onclick="closeDetailWriteModal()">
                                <img src="./icons/Icon-close.png" alt="" />
                            </button>
                        </div>
                    </div>

                    <div class="modal-content">
                        <article>

                            <!-- 기본 정보 -->
                            <div class="section">
                                <div class="section-title">기본 정보</div>
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label for="write_detail_grp_cd">코드 그룹</label>
                                        <input type="text" class="text" id="write_detail_grp_cd" readonly>
                                    </div>

                                    <div class="form-group">
                                        <label for="write_detail_cd">코드</label>
                                        <input type="text" class="text" id="write_detail_cd" placeholder="코드">
                                        <input type="hidden" id="write_detail_cd_origin">
                                    </div>

                                    <div class="form-group">
                                        <label for="write_detail_cd_nm">코드명</label>
                                        <input type="text" class="text" id="write_detail_cd_nm" placeholder="코드명">
                                    </div>

                                    <div class="form-group">
                                        <label for="write_detail_use_yn">사용여부</label>
                                        <select id="write_detail_use_yn">
                                            <option value="Y">사용 (Y)</option>
                                            <option value="N">미사용 (N)</option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label for="write_detail_sort_no">정렬 순서</label>
                                        <input type="number" class="text" id="write_detail_sort_no"
                                               placeholder="정렬 순서를 숫자로 입력해주세요">
                                    </div>

                                </div>
                            </div>

                            <!-- 정렬 -->
                            <div class="section">
                                <div class="section-title">부가 정보</div>
                                <div class="form-grid">

                                    <div class="form-group">
                                        <label for="write_detail_adinfo_01">부가정보 1</label>
                                        <input type="text" class="text" id="write_detail_adinfo_01"
                                               placeholder="부가정보 1">
                                    </div>

                                    <div class="form-group">
                                        <label for="write_detail_adinfo_02">부가정보 2</label>
                                        <input type="text" class="text" id="write_detail_adinfo_02"
                                               placeholder="부가정보 2">
                                    </div>

                                    <div class="form-group">
                                        <label for="write_detail_adinfo_03">부가정보 3</label>
                                        <input type="text" class="text" id="write_detail_adinfo_03"
                                               placeholder="부가정보 3">
                                    </div>

                                    <div class="form-group">
                                        <label for="write_detail_adinfo_04">부가정보 4</label>
                                        <input type="text" class="text" id="write_detail_adinfo_04"
                                               placeholder="부가정보 4">
                                    </div>

                                    <div class="form-group">
                                        <label for="write_detail_adinfo_05">부가정보 5</label>
                                        <input type="text" class="text" id="write_detail_adinfo_05"
                                               placeholder="부가정보 5">
                                    </div>

                                </div>
                            </div>

                        </article>
                    </div>
                    <div class="modal-btn">
                        <ul>
                            <li>
                                <button class="btn btn-close" onclick="closeDetailWriteModal()">
                                    닫기
                                </button>
                            </li>
                            <li><button class="btn btn-save" id="btn-detail-save">저장</button></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api/cm/cm040.js"></script>

</th:block>

</html>
