<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<th:block layout:fragment="searchCondition"></th:block>

<th:block layout:fragment="content">

    <!-- 클래스 주입 -->
    <script>
        (function () {
            var script = document.currentScript;
            var contentsWrap = script && script.closest ? script.closest(".contents-wrap") : null;
            var whiteFull = script && script.closest ? script.closest(".white-full") : null;

            if (contentsWrap) contentsWrap.classList.add("hr030-dashboard-wrap");
            if (whiteFull) whiteFull.classList.add("hr030-dashboard-shell");
        })();
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 스타일 -->
    <style>
        .main { flex: 1; padding: 20px; }

        .kpi-container {
          display: grid;
          grid-template-columns: repeat(5, 1fr);
          gap: 15px;
          margin-bottom: 20px;
        }

        .card {
          background: #fff;
          border-radius: 12px;
          padding: 20px;
          box-shadow: 0 4px 10px rgba(0,0,0,0.08);
          transition: all 0.2s ease;
          cursor: pointer;
        }

        .card:hover {
          transform: translateY(-5px);
          box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .card h3 { font-size: 13px; color: #888; }
        .card p { font-size: 24px; font-weight: bold; margin-top: 10px; color:#212E41; }

        .chart-row {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 20px;
          margin-bottom: 20px;
        }

        .chart-box {
          background: #fff;
          border-radius: 12px;
          padding: 20px 20px 55px;
          height: 300px;
          box-shadow: 0 4px 10px rgba(0,0,0,0.08);
          transition: all 0.2s ease;
        }

        .chart-box:hover {
          transform: translateY(-3px);
          box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .chart-box canvas {
          width: 100% !important;
        }

        .full-chart { height: 320px; margin-bottom: 20px; }

        .section-title {
          font-size: 14px;
          font-weight: 600;
          color: #212E41;
          margin-bottom: 10px;
          display: flex;
          align-items: center;
          gap: 6px;
          border-bottom: 1px solid #eee;
          padding-bottom: 6px;
        }

        .risk {
          background: #fff;
          padding: 20px;
          border-radius: 12px;
          box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .risk:hover {
          transform: translateY(-3px);
          box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .risk li {
          padding: 12px;
          border-bottom: 1px solid #eee;
          display:flex;
          justify-content: space-between;
          transition: background 0.2s;
        }

        .risk li:hover { background: #f8f9fb; }
        .risk li:last-child { border-bottom: none; }
    </style>

    <div class="main">

        <!-- KPI -->
        <div class="kpi-container">
            <div class="card"><h3>전체 프리랜서</h3><p>120명</p></div>
            <div class="card"><h3>현재 투입 인원</h3><p>85명</p></div>
            <div class="card"><h3>대기 인원</h3><p>25명</p></div>
            <div class="card"><h3>진행 프로젝트</h3><p>18개</p></div>
            <div class="card"><h3>7일 내 종료</h3><p class="highlight">3건</p></div>
        </div>

        <!-- 차트 -->
        <div class="chart-row">
            <div class="chart-box">
                <div class="section-title">👤 인력 상태</div>
                <canvas id="peopleChart"></canvas>
            </div>
            <div class="chart-box">
                <div class="section-title">📊 프로젝트 상태</div>
                <canvas id="projectChart"></canvas>
            </div>
        </div>

        <div class="chart-box full-chart">
            <div class="section-title">📈 월별 프로젝트 추이</div>
            <canvas id="monthlyChart"></canvas>
        </div>

        <!-- 리스크 -->
        <div class="risk">
            <div class="section-title">⚠ 리스크 / 알림</div>
            <ul>
                <li><span>7일 이내 종료 프로젝트</span><span class="highlight">3건</span></li>
                <li><span>미배정 인력</span><span class="highlight">25명</span></li>
                <li><span>지연 프로젝트</span><span class="highlight">2건</span></li>
                <li><span>장기 투입 인력 (6개월 이상)</span><span class="highlight">12명</span></li>
            </ul>
        </div>

    </div>

    <!-- 차트 생성 (DOM 로딩 후 실행) -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            new Chart(document.getElementById('peopleChart'), {
                type: 'doughnut',
                data: {
                    labels: ['투입', '대기', '휴면'],
                    datasets: [{
                        data: [85, 25, 10],
                        backgroundColor: ['#E50019', '#212E41', '#ccc']
                    }]
                },
                options: { maintainAspectRatio: false }
            });

            new Chart(document.getElementById('projectChart'), {
                type: 'bar',
                data: {
                    labels: ['진행중', '완료', '지연', '대기'],
                    datasets: [{
                        data: [18, 40, 2, 5],
                        backgroundColor: ['#E50019', '#212E41', '#aaa', '#ddd'],
                        borderRadius: 6,
                        barThickness: 40
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            new Chart(document.getElementById('monthlyChart'), {
                type: 'line',
                data: {
                    labels: ['1월','2월','3월','4월','5월','6월'],
                    datasets: [{
                        label: '프로젝트 수',
                        data: [5, 10, 8, 15, 12, 18],
                        borderColor: '#E50019',
                        pointBackgroundColor: '#212E41',
                        pointBorderColor: '#ccc',
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    maintainAspectRatio: false
                }
            });

        });
    </script>

</th:block>
</html>
