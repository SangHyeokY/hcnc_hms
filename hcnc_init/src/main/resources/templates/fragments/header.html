<header
  class="header"
  th:fragment="headerFragment"
  xmlns:th="http://www.thymeleaf.org"
>
  <div class="header-topbar">
    <div class="header-brand">
      <h1 id="logo" class="logo">
        <a th:href="@{/hr030}">
          <img
            th:src="@{/images/common/header-logo.png}"
            src="../images/common/header-logo.png"
            alt="HCNC"
          />
        </a>
      </h1>
      <div class="logo-sub">
        <div class="sub-box">인적 자원 관리 시스템</div>
      </div>
    </div>

    <div class="header-tools">
      <div class="header-search-wrap is-hidden" aria-hidden="true">
        <label class="header-search" for="hr030DashboardSearch">
          <span class="header-search-icon" aria-hidden="true"></span>
          <input
            type="search"
            id="hr030DashboardSearch"
            placeholder="검색어를 입력하세요."
            autocomplete="off"
          />
        </label>
        <p class="header-search-note is-empty" id="hr030SearchResultNote" aria-live="polite"></p>
      </div>

      <button type="button" class="header-alert hr030-admin-alert is-hidden" aria-label="알림" aria-hidden="true" tabindex="-1">
        <span class="header-alert-icon" aria-hidden="true"></span>
        <span class="header-alert-count" id="hr030AlertCount"></span>
      </button>

      <div class="header-profile-menu">
        <button type="button" class="profile-area header-profile header-profile-trigger" aria-label="계정 메뉴" aria-haspopup="menu" aria-expanded="false">
          <div class="profile-img" id="profileImgContainer"></div>
          <div class="header-profile-copy">
            <div class="header-profile-name-row">
              <div id="profileName" class="fw700 fs16"></div>
              <div id="profileJob" class="header-profile-job"></div>
            </div>
            <div id="profileId" class="fw500 fs14"></div>
          </div>
          <span class="header-profile-caret" aria-hidden="true"></span>
        </button>
        <div class="header-profile-popover" aria-label="계정 메뉴" role="menu">
          <button id="logout-btn" type="button" class="header-popover-action">
            <span class="header-popover-lock" aria-hidden="true"></span>
            <span>로그아웃</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="lnb">
    <div class="lnb-inner">
      <aside class="app-sidebar left-menu">
        <nav class="app-nav nav">
          <div class="lnb-menu">
            <!--메뉴변수 menu.js-->
          </div>
        </nav>
      </aside>
    </div>
  </div>
</header>
