<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${metaTitle} ?: '인적 자원 관리 시스템'">인적 자원 관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://unpkg.com/tabulator-tables@4.0.5/dist/css/tabulator.min.css" rel="stylesheet">
    <link rel="icon" th:href="@{/favicon.png}" href="/favicon.png" type="image/png">
    <link rel="stylesheet" th:href="@{/css/import.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@4.0.5/dist/js/tabulator.min.js"></script>
    <script src="/js/api/grid-pager.js"></script>
    <script type="module" th:src="@{/js/layout/pageCommon.js}" src="/js/layout/pageCommon.js"></script>
    <script type="module" th:src="@{/js/layout/menu.js}" src="/js/layout/menu.js"></script>
    
</head>
<body data-context-path="/">

<input type="hidden" id="LOGIN_AUTH" th:value="${LOGIN_AUTH}" />
<input type="hidden" id="LOGIN_LOCK" th:value="${LOGIN_LOCK}" />
<input type="hidden" id="LOGIN_PW_CHG" th:value="${LOGIN_PW_CHG}" />

<div id="loading-overlay">
    <div class="loading-box">
        <img src="./images/common/loadingPanal.gif" alt="loading">
        <p>저장 중입니다...</p>
    </div>
</div>

<div id="app-wrapper" class="wrapper gr">
    <div class="container-wrap">
        <!-- 페이지의 1dept을 불러오는 영역 -->
        <th:block th:insert="~{fragments/header :: headerFragment}"></th:block>
        <div class="container">
            <div class="contents-wrap" id="">
                <th:block th:replace="~{fragments/page-common :: pageCommonFragment}"></th:block>

                <section class="search-area">
                    <form action="">
                        <div class="fl-sb">
                            <div class="search-info">
                                <!-- 각 페이지에서 검색 조건을 커스터마이징 -->
                                <th:block layout:fragment="searchCondition">
                                    <div class="search-select">
                                        <select name="" id="">
                                            <option value="">구분</option>
                                        </select>
                                    </div>
                                    <div class="search-input">
                                        <p class="fl-ac">
                                            <label class=""></label>
                                            <input type="text" placeholder="검색어를 입력하세요"/>
                                        </p>
                                    </div>
                                </th:block>
                            </div>
                            <div class="search-btn-area">
                                <button class="btn-search">조회</button>
                            </div>
                        </div>
                    </form>
                </section>

                <section class="white-full">
                    <div class="content-title fl-sb fl-ac" th:fragment="contentTitleFragment" xmlns:th="http://www.thymeleaf.org" style="display:none;">
                        <h4 class="page-sub-title"><!--페이지 상세 타이틀--></h4>
                        <div class="btn-area">
                            <button type="button" class="btn-new">신규</button>
                            <button type="button" class="btn-edit">수정</button>
                            <button type="button" class="btn-delete">삭제</button>
                            <th:block layout:fragment="additionalButtons">
                                <!-- 페이지별로 여기에 추가 버튼 정의 -->
                            </th:block>
                        </div>
                    </div>
                    <div class="content-body">
                        <th:block layout:fragment="content">
                        <!-- 페이지별 컨텐츠 -->
                        </th:block>
                    </div>
                </section>
            
            </div>
        </div>
      </div>
    </div>
</div>
<script th:inline="javascript">
    /*<![CDATA[*/
    window.LOGIN_USER = {
        id: /*[[${session.LOGIN_USER_ID}]]*/ '',
        name: /*[[${session.LOGIN_USER_NM}]]*/ '',
        job: /*[[${session.LOGIN_USER_JOB_NM}]]*/ '',
        img: /*[[${LOGIN_USER_IMG}]]*/ null
    };
    /*]]>*/
</script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
      const { id: devId, name: devName, job: devJob, img: devImg } = window.LOGIN_USER || {};
      setUserProfile(devId, devName, devImg, devJob);
    });

    $(document).on("click", ".header-profile-trigger", function (e) {
        e.stopPropagation();

        const $wrap = $(this).closest(".header-profile-menu");
        const isOpen = $wrap.hasClass("is-open");

        $(".header-profile-menu")
            .removeClass("is-open")
            .find(".header-profile-trigger")
            .attr("aria-expanded", "false");

        if (!isOpen) {
            $wrap.addClass("is-open");
            $(this).attr("aria-expanded", "true");
        }
    });

    $(document).on("click", function () {
        $(".header-profile-menu")
            .removeClass("is-open")
            .find(".header-profile-trigger")
            .attr("aria-expanded", "false");
    });

    // lnb에 프로필 이미지 표시하기
    function setUserProfile(devId, devName, devImgBase64, devJob) {
        const $badge = $("#profileBadgeText");

        const badgeText = getProfileBadgeText(devName);
        const color = stringToSoftColor(devName || devId || "default");

        $badge.text(badgeText);
        $badge.css({
            backgroundColor: color,
            color: "#fff"
        });

        $(".header-profile-trigger").attr("aria-label", `${badgeText} 계정 메뉴`);
    }

    // 이름에서 뒤 2글자 추출하기
    function getProfileText(name) {
        if (!name) return "";

        name = name.trim();

        if (name.length >= 2) {
            return name.slice(-2); // 뒤에서 2글자
        }

        return name;
    }

    function getProfileBadgeText(name) {
        const fallback = getProfileText(name);
        return fallback || "";
    }

    // 이니셜 아이콘을 만들기 위한 색상표
    function stringToSoftColor(str) {
        let hash = 0;

        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }

        const h = Math.abs(hash) % 360;

        // 파스텔 느낌 유지하면서 대비 확보
        const s = 55 + (Math.abs(hash) % 15);      // 55~70
        const l = 45 + (Math.abs(hash >> 3) % 10); // 45~55

        return `hsl(${h}, ${s}%, ${l}%)`;
    }
</script>
<script>
    (function () {
        var ctx = document.body.dataset.contextPath;
        if (ctx.endsWith("/")) ctx = ctx.slice(0, -1);
        window.__CONTEXT_PATH__ = ctx;
    })();
</script>
<script type="module" th:src="@{/js/layout/layout.js}" src="/js/layout/layout.js"></script>
<script src="/js/api/common.js"></script>
</body>
</html>
